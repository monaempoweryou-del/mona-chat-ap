name: Send Email Queue

on:
  push:
    paths:
      - 'email_queue/pending/*.json'

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send queued emails
        id: send
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python .github/send_queued_emails.py

      - name: Commit results
        run: |
          git config user.name "Mona Agency OS"
          git config user.email "monaempoweryou@gmail.com"
          if [ -n "$(git status --porcelain email_queue/)" ]; then
            git add email_queue/
            git commit -m "Email queue: processed [skip ci]"
            git push
          fi
