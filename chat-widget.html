<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mona — Agency AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
    background: #EBF5FB;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: #1B2D4F;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 3px solid #2E86C1;
    flex-shrink: 0;
  }

  .logo {
    width: 36px;
    height: 28px;
    flex-shrink: 0;
  }

  .header-text h1 {
    color: #ffffff;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .header-text p {
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    font-weight: 400;
    margin-top: 1px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #1ABC9C;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(26,188,156,0.6);
  }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #2E86C1; border-radius: 2px; }

  /* Message bubbles */
  .message {
    display: flex;
    flex-direction: column;
    max-width: 78%;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    align-items: flex-end;
  }

  .message.assistant {
    align-self: flex-start;
    align-items: flex-start;
  }

  .bubble {
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .bubble {
    background: #2E86C1;
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }

  .message.assistant .bubble {
    background: #ffffff;
    color: #1B2D4F;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(27,45,79,0.08);
  }

  .sender-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .message.user .sender-label { color: #2E86C1; }
  .message.assistant .sender-label { color: #5DADE2; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 15px;
    background: #ffffff;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(27,45,79,0.08);
    width: fit-content;
  }

  .typing-indicator span {
    width: 7px;
    height: 7px;
    background: #5DADE2;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Welcome message */
  .welcome {
    text-align: center;
    padding: 30px 20px;
    color: #1B2D4F;
  }

  .welcome .welcome-logo {
    width: 48px;
    height: 37px;
    margin: 0 auto 12px;
    display: block;
  }

  .welcome h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .welcome p {
    font-size: 13px;
    color: #5DADE2;
    font-weight: 500;
  }

  /* Input area */
  .input-area {
    background: #ffffff;
    border-top: 1px solid #d4e6f5;
    padding: 12px 16px;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 760px;
    margin: 0 auto;
  }

  textarea {
    flex: 1;
    border: 1.5px solid #d4e6f5;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    color: #1B2D4F;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
    background: #f8fbfe;
  }

  textarea:focus { border-color: #2E86C1; background: #ffffff; }
  textarea::placeholder { color: #a0b8cc; }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #2E86C1;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  .send-btn:hover { background: #1B2D4F; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: #a0b8cc; cursor: not-allowed; }

  .send-btn svg { width: 18px; height: 18px; fill: white; }

  .powered-by {
    text-align: center;
    font-size: 10px;
    color: #a0b8cc;
    margin-top: 6px;
    letter-spacing: 0.3px;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .message { max-width: 88%; }
    .bubble { font-size: 13px; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Header -->
<div class="header">
  <svg class="logo" viewBox="0 0 60 46" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="0,46 0,0 18,0 30,22 42,0 60,0 60,46 46,46 46,20 30,46 14,20 14,46" fill="#ffffff"/>
    <polygon points="20,0 30,18 40,0 60,0 60,6 30,46 0,6 0,0" fill="#2E86C1" opacity="0.85"/>
  </svg>
  <div class="header-text">
    <h1>Mona</h1>
    <p>Agency AI · Mona Digital Marketing</p>
  </div>
  <div class="status-dot"></div>
</div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <svg class="welcome-logo" viewBox="0 0 60 46" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,46 0,0 18,0 30,22 42,0 60,0 60,46 46,46 46,20 30,46 14,20 14,46" fill="#1B2D4F"/>
      <polygon points="20,0 30,18 40,0 60,0 60,6 30,46 0,6 0,0" fill="#2E86C1" opacity="0.85"/>
    </svg>
    <h2>Hi, I'm Mona</h2>
    <p>Your agency AI. Ask me anything.</p>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-row">
    <textarea
      id="input"
      placeholder="Message Mona..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="powered-by">Powered by Claude · Mona Digital Marketing</div>
</div>

<script>
  // ← Replace this with your Render URL after deployment
  const API_URL = "https://mona-chat-ap.onrender.com";

  let history = [];
  let isStreaming = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollToBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addMessage(role, content) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="sender-label">${role === 'user' ? 'You' : 'Mona'}</div>
      <div class="bubble" id="bubble-${Date.now()}">${escapeHtml(content)}</div>
    `;
    msgs.appendChild(div);
    scrollToBottom();
    return div.querySelector('.bubble');
  }

  function showTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = `
      <div class="sender-label">Mona</div>
      <div class="typing-indicator"><span></span><span></span><span></span></div>
    `;
    msgs.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    if (isStreaming) return;

    const input = document.getElementById('input');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    input.style.height = 'auto';
    isStreaming = true;
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', message);
    showTyping();

    try {
      const response = await fetch(`${API_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history })
      });

      removeTyping();
      const bubble = addMessage('assistant', '');
      let fullText = '';

      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            if (parsed.text) {
              fullText += parsed.text;
              bubble.innerHTML = escapeHtml(fullText);
              scrollToBottom();
            }
          } catch {}
        }
      }

      history.push({ role: 'user', content: message });
      history.push({ role: 'assistant', content: fullText });

      // Keep history to last 20 messages
      if (history.length > 20) history = history.slice(-20);

    } catch (err) {
      removeTyping();
      addMessage('assistant', 'Something went wrong. Please try again.');
      console.error(err);
    }

    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('input').focus();
  }
</script>

</body>
</html>
